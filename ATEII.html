<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Mapa Tiendas Sigma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { margin:0; font-family: system-ui, sans-serif; }
    #map { height:100vh; }
    .popup h3 { margin:0 0 4px; font-size:14px; }
    .popup div { font-size:12px; margin:2px 0; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
(() => {

  /* ================= CONFIG ================= */
  const CSV_URL = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";

  /* ================= MAP ================= */
  const map = L.map("map", { preferCanvas: true })
    .setView([-12.0464, -77.0428], 11);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const markersLayer = L.layerGroup().addTo(map);

  /* ================= UTILS ================= */
  function toNumber(v){
    if(!v) return NaN;
    const n = parseFloat(String(v).replace(",", "."));
    return Number.isFinite(n) ? n : NaN;
  }

  function clean(v){
    return (v ?? "").toString().trim();
  }

  function colorByCanal(canal){
    const c = canal.toUpperCase();
    if(c.includes("DET")) return "#2563eb";       // azul
    if(c.includes("FOSE")) return "#16a34a";     // verde
    if(c.includes("MES")) return "#eab308";      // amarillo
    return "#7c3aed";                             // morado default
  }

  /* ================= LOAD CSV ================= */
  Papa.parse(CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete: res => {
      const rows = res.data;
      let count = 0;

      rows.slice(1).forEach(row => {
        /*
          ===== MAPEO REAL DE TU CSV =====
          0  = Código cliente
          7  = Nombre
          16 = Municipio/Distrito
          21 = Canal
          24 = Giro
          28 = Latitud
          29 = Longitud
          46 = Oficina
          último = Estado
        */
        const lat = toNumber(row[28]);
        const lon = toNumber(row[29]);
        if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        const codigo   = clean(row[0]);
        const nombre   = clean(row[7]);
        const distrito = clean(row[16]);
        const canal    = clean(row[21]);
        const giro     = clean(row[24]);
        const oficina  = clean(row[46]);
        const estado   = clean(row[row.length - 1]);

        // descartar PAGADOR sin tienda
        if(canal.toUpperCase().includes("PAGADOR")) return;

        const marker = L.circleMarker([lat, lon], {
          radius: 6,
          weight: 1,
          color: "#111",
          fillColor: colorByCanal(canal),
          fillOpacity: 0.9
        });

        marker.bindPopup(`
          <div class="popup">
            <h3>${codigo}</h3>
            <div><strong>${nombre}</strong></div>
            <div>Canal: ${canal}</div>
            <div>Giro: ${giro}</div>
            <div>Distrito: ${distrito}</div>
            <div>Oficina: ${oficina}</div>
            <div>Estado: ${estado}</div>
            <hr/>
            <a target="_blank"
              href="https://       marker.addTo(markersLayer);
        count++;
      });

      if(markersLayer.getBounds().isValid()){
        map.fitBounds(markersLayer.getBounds().pad(0.08));
      }

      console.log("Tiendas mapeadas:", count);
    },
    error: err => {
      alert("Error cargando CSV");
      console.error(err);
    }
  });

})();
</script>
</body>
</html>
