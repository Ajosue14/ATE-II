<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa Tiendas Sigma</title>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/let@1.9.4/dist/cript>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  body { margin: 0; }
  #map { height: 100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script>
(() => {

  const CSV_URL =
    "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";

  // ===== MAPA =====
  const map = L.map("map").setView([-12.0464, -77.0428], 11);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const layer = L.layerGroup().addTo(map);

  function num(v){
    const n = parseFloat(String(v).replace(",", "."));
    return Number.isFinite(n) ? n : NaN;
  }

  function clean(v){
    return (v ?? "").toString().trim();
  }

  Papa.parse(CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete: res => {
      let count = 0;

      res.data.slice(1).forEach(row => {
        const lat = num(row[28]);
        const lon = num(row[29]);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        const nombre = clean(row[7]);
        const canal  = clean(row[21]);
        const oficina = clean(row[46]);
        const estado = clean(row[row.length - 1]);

        const marker = L.circleMarker([lat, lon], {
          radius: 5,
          color: "#000",
          fillColor: "#2563eb",
          fillOpacity: 0.85
        }).bindPopup(`
          <strong>${nombre}</strong><br>
          Canal: ${canal}<br>
          Oficina: ${oficina}<br>
          Estado: ${estado}<br><br>
          <a target="_blank"
             href="https://www.google.com/maps?q=${lat    `);

        marker.addTo(layer);
        count++;
      });

      console.log("Tiendas dibujadas:", count);
      if (layer.getBounds().isValid()) {
        map.fitBounds(layer.getBounds().pad(0.1));
      }
    },
    error: err => {
      console.error("Error CSV", err);
    }
  });

})();
</script>
</body>
</html>
